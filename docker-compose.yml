services:
  postgres:
    image: postgres:16-alpine
    container_name: livematch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: livematch
      POSTGRES_USER: livematch
      POSTGRES_PASSWORD: livematch_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livematch -d livematch"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: