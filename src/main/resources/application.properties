spring.application.name=livematch

server.port=8081

# === Baza danych (PostgreSQL w Dockerze) ===
spring.datasource.url=jdbc:postgresql://localhost:5432/livematch
spring.datasource.username=livematch
spring.datasource.password=livematch_dev_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA / Hibernate ===
# update = Hibernate sam dorzuca brakujące tabele/kolumny przy starcie
# (dla developmentu wygodne; w produkcji Flyway/Liquibase)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# === Actuator (szczegóły, w tym status DB) ===
management.endpoint.health.show-details=always