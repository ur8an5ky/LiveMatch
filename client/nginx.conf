server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # REST API — proxy to backend service (named "app" in docker-compose)
    location /api/ {
        proxy_pass http://app:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket / STOMP — needs upgrade headers
    location /ws {
        proxy_pass http://app:8081/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # SPA fallback — React Router needs this for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}